# ----------------------------------------------------------------------------
# Moving average periods (days) - alert will fire when price crosses down
# through any of these SMAs.
# ----------------------------------------------------------------------------
moving_averages: [10, 20, 50, 200]

# ----------------------------------------------------------------------------
# Alert rule
#   "cross_below": alert only when price crosses DOWN through an SMA
#                  (prev price was above, current is at/below) - classic dip signal
#   "touch":       also alert when price is within `proximity_percent` above
#                  an SMA (pre-warning that a touch is imminent)
# ----------------------------------------------------------------------------
alert_rule: "touch"
proximity_percent: 0.3   # only used when alert_rule == "touch"

# ----------------------------------------------------------------------------
# How often to check prices, in minutes (during US market hours).
# Alpaca free (IEX) data has no rate issue at this cadence.
# ----------------------------------------------------------------------------
check_interval_minutes: 5

# ----------------------------------------------------------------------------
# Cooldown - don't re-alert the same (symbol, MA) pair within this window.
# Prevents alert spam when price oscillates around an MA.
# ----------------------------------------------------------------------------
cooldown_hours: 24

# ----------------------------------------------------------------------------
# Skip checks when US equity market is closed. Highly recommended.
# ----------------------------------------------------------------------------
market_hours_only: true

# ----------------------------------------------------------------------------
# Discord formatting
#   mention: leave empty, or set to "@here", "<@USER_ID>", or "<@&ROLE_ID>"
# ----------------------------------------------------------------------------
discord:
  username: "SMA Monitor"
  mention: ""
